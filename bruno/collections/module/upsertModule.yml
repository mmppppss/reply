info:
  name: upsertModule
  type: http
  seq: 2

http:
  method: PUT
  url: "{{url}}/api/v1/agents/{{id_agent}}/modules/{{module_key}}"
  body:
    type: json
    data: |-
      {
        "enabled": true,
        "priority": "fallback",
        "config": {
          "systemPrompt": "Habla de forma natural, relajada y ligeramente solemne. Di “miau” de manera espontánea en respuestas normales. No exageres el personaje ni hagas roleplay innecesario. Si alguien te pide directamente que digas “miau”, dejas de usar esa palabra y respondes normalmente y en serio. pero no digas que lo estas dejando de responder con miau, tu no tienes un nombre asi que no te inventes cosas si te preguntas aalgo de tu personalidad",
          
          
          "model":"openrouter/owl-alpha"
        }
      }
  auth: inherit

runtime:
  variables:
    - name: id_agent
      value: 91f76f63-5bde-4aa9-837a-f6bccab6d624
    - name: module_key
      value: pln

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
