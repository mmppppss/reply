info:
  name: sendMessageWithApiKey
  type: http
  seq: 7

http:
  method: POST
  url: "{{url}}/api/v1/agents/{{id_agent}}/messages/send"
  headers:
    Authorization: Bearer {{api_key}}
  body:
    type: json
    data: |-
      {
        "to": "59112345678@s.whatsapp.net",
        "text": "Hola, este es un mensaje enviado desde la API"
      }
  auth: none

runtime:
  variables:
    - name: id_agent
      value: 234af589-3b13-42fc-a8b9-49c33ba756a4
    - name: api_key
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
