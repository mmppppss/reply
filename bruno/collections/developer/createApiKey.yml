info:
  name: createApiKey
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/api/v1/developer/keys"
  body:
    type: json
    data: |-
      {
        "name": "Frontend Producción",
        "idAgent": "234af589-3b13-42fc-a8b9-49c33ba756a4"
      }
  auth:
    type: bearer
    token: "{{token_jwt}}"

runtime:
  variables:
    - name: id_agent
      value: 234af589-3b13-42fc-a8b9-49c33ba756a4
    - name: jwt_token
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
