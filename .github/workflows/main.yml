name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar conectividad IPv6
        run: |
          echo "=== Interfaces IPv6 ==="
          ip -6 addr show
          echo "=== Ping IPv6 a google ==="
          ping6 -c 2 ipv6.google.com || echo "No hay IPv6"
      - name: SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd $HOME/reply/
            
            echo "git pull..."
            git pull origin main
            
            echo "dependencias..."
            pnpm install --frozen-lockfile
            
            echo "build..."
            pnpm build
            
            echo "PM2..."
            pm2 reload reply || pm2 start "pnpm start" --name reply
            
            pm2 save
